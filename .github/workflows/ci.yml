# Fast checks. Full `next build` is run at deploy; it requires a valid DATABASE_URL and applied migrations.
name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Prisma client
        run: npx prisma generate

      - name: Unit tests
        run: npm run test

      - name: Typecheck
        run: npm run typecheck
