# Full stack for Coolify (or any VPS) — Next.js + API + PostgreSQL + Redis.
# In Coolify: create a resource → Docker Compose → set "Compose file" to this path.
# Set variables in Coolify (or a .env file next to compose). Use strong secrets in production.
#
# One-time P3009 (failed Prisma migration) — redeploys do NOT fix the DB.
# On the Coolify host, use the SAME -p (project) name as your stack (see deployment
# log, e.g. "docker compose ... --project-name mc84owo0gkc88g4owkscgcgw") and the
# same .env the app uses:
#   docker compose -p YOUR_PROJECT_NAME -f docker-compose.coolify.yml --env-file /path/to/.env --profile tools run --rm migrate-resolve
# Then: docker compose -p YOUR_PROJECT_NAME -f docker-compose.coolify.yml up -d web

name: acep

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-acep}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-acep}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U '${POSTGRES_USER:-acep}' -d '${POSTGRES_DB:-acep}' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"
        else
          exec redis-server --appendonly yes
        fi
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - if [ -n "$$REDIS_PASSWORD" ]; then redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG; else redis-cli ping | grep -q PONG; fi
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: postgresql://${POSTGRES_USER:-acep}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-acep}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_URL: ${REDIS_URL:-}
      # Browser calls use NEXT_PUBLIC_SITE_URL — keep API CORS aligned with it.
      CORS_ORIGIN: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3100}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    ports:
      - "${API_PUBLISH_PORT:-3001}:3001"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3100}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-${SERVICE_URL_BACKEND:-http://localhost:3001}}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3100"
      HOSTNAME: "0.0.0.0"
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3100}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-${SERVICE_URL_BACKEND:-http://localhost:3001}}
      DATABASE_URL: postgresql://${POSTGRES_USER:-acep}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-acep}
      CMS_ADMIN_EMAIL: ${CMS_ADMIN_EMAIL:-}
      CMS_ADMIN_PASSWORD: ${CMS_ADMIN_PASSWORD:-}
      CMS_ADMIN_NAME: ${CMS_ADMIN_NAME:-}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      API_INTERNAL_URL: http://backend:3001
      # One-time P3009: set to migration folder name, deploy once, then unset. See prisma/ops/PORTAL_MIGRATION_P3009.txt
      PRISMA_RESOLVE_ROLLED_BACK_MIGRATION: ${PRISMA_RESOLVE_ROLLED_BACK_MIGRATION:-}
      # Persist WordPress-style uploads (served as static files under /media/cms/*)
      CMS_MEDIA_DIR: /app/public/media/cms
    volumes:
      - cms_media:/app/public/media/cms
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    # Use /api/health (lightweight, no DB) — the home page is heavy; wget timing out
    # here can mark the service unhealthy and trigger restart loops in some runtimes.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3100/api/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 90s
    ports:
      - "${WEB_PUBLISH_PORT:-3100}:3100"

  # Prisma P3009 recovery (not started by default). See comment at top of file.
  migrate-resolve:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3100}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-${SERVICE_URL_BACKEND:-http://localhost:3001}}
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-acep}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-acep}
    command: ["/bin/sh", "/app/scripts/resolve-failed-migration-20260426110650.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  cms_media:
